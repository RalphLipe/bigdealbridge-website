<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17666029328"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-17666029328');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}" />
  {% if page.keywords %}<meta name="keywords" content="{{ page.keywords }}" />{% endif %}
  <meta property="og:title" content="{{ page.title }}" />
  <meta property="og:description" content="{{ page.description }}" />
  <meta property="og:url" content="{{ page.canonical }}" />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="{{ page.canonical }}" />
  <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #1a4731;
      --green2:  #22603f;
      --gold:    #c9a84c;
      --gold-lt: #e8c97a;
      --cream:   #faf6ee;
      --dark:    #0f1f17;
      --text:    #2b3a31;
      --muted:   #6b7e71;
      --radius:  18px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 40px;
      background: rgba(26,71,49,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-company {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--gold-lt);
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(250,246,238,0.65);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold-lt); }

    .nav-links .nav-product a {
      color: rgba(250,246,238,0.9);
    }

    .nav-sep {
      width: 1px;
      height: 14px;
      background: rgba(201,168,76,0.25);
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark);
      padding: 48px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      border-top: 1px solid rgba(201,168,76,0.1);
    }

    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--gold-lt);
    }

    .footer-links { display: flex; gap: 28px; list-style: none; }
    .footer-links a {
      font-size: 0.85rem;
      color: rgba(250,246,238,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--gold-lt); }

    .footer-copy {
      font-size: 0.8rem;
      color: rgba(250,246,238,0.3);
      width: 100%;
      text-align: center;
      margin-top: 8px;
    }

    /* ── SHARED COMPONENTS ── */
    .section-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .btn-appstore {
      display: inline-block;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn-appstore:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-appstore img { height: 52px; }

    .qr-hint {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-code canvas, .qr-code img {
      border-radius: 10px;
      padding: 10px;
      background: white;
      display: block;
    }
    .qr-hint span {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(250,246,238,0.45);
    }

    /* ── PAGE HEADER (inner pages) ── */
    .page-header {
      background: var(--dark);
      background-image:
        radial-gradient(ellipse 60% 80% at 80% 50%, rgba(34,96,63,0.3) 0%, transparent 70%);
      padding: 140px 80px 80px;
      text-align: center;
    }
    .page-header .section-label { margin-bottom: 16px; }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 900;
      color: var(--cream);
      line-height: 1.1;
      margin-bottom: 20px;
    }
    .page-header p {
      font-size: 1rem;
      color: rgba(250,246,238,0.6);
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── CONTENT BASE (inner pages) ── */
    .content {
      max-width: 780px;
      margin: 0 auto;
      padding: 72px 40px 100px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 16px 24px; }
      .nav-links { gap: 16px; }
      .page-header { padding: 120px 32px 60px; }
      .content { padding: 48px 20px 80px; }
      footer { flex-direction: column; text-align: center; padding: 40px 32px; }
      .footer-links { flex-wrap: wrap; justify-content: center; gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo">
      <img src="/logo-mark.svg" alt="Big Deal Bridge LLC" style="height:30px;filter:brightness(0) saturate(100%) invert(85%) sepia(30%) saturate(600%) hue-rotate(5deg) brightness(105%);">
      <span class="nav-company">Big Deal Bridge LLC</span>
    </a>
    <ul class="nav-links">
      <li class="nav-product"><a href="/">Big Deal Bridge</a></li>
      <li class="nav-product"><a href="/handsee/">Handsee</a></li>
      <li class="nav-sep" aria-hidden="true"></li>
      <li><a href="/faq/">FAQ</a></li>
      <li><a href="/privacy/">Privacy</a></li>
      <li><a href="/support/">Support</a></li>
    </ul>
  </nav>

  {{ content }}

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">
      <img src="/logo-full.svg" alt="Big Deal Bridge LLC" style="height:28px;filter:brightness(0) saturate(100%) invert(85%) sepia(30%) saturate(600%) hue-rotate(5deg) brightness(105%);display:block;margin-bottom:4px;">
      LLC
    </div>
    <ul class="footer-links">
      <li><a href="/faq/">FAQ</a></li>
      <li><a href="/privacy/">Privacy Policy</a></li>
      <li><a href="/support/">Support</a></li>
    </ul>
    <p class="footer-copy">Copyright &copy; 2024&ndash;2026 Big Deal Bridge LLC. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</body>
</html>
